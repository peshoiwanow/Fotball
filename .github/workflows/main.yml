name: Hourly Deep Analysis Update

on:
  schedule:
    # Пуска скрипта на всеки кръгъл час
    - cron: '0 * * * *'
  # Позволява ти да го пускаш ръчно от бутона "Run workflow"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests google-genai

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git commit -m "AI update matches" || exit 0
          git push
