name: Hourly Deep Analysis Update

on:
  schedule:
    - cron: '0 * * * *' # Автоматично на всеки час
  workflow_dispatch: # Позволява ти да го пуснеш ръчно от бутона

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests


      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Увери се, че това име съвпада точно със записаното в Settings -> Secrets!
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data.json
          git commit -m "Update matches and deep analysis: $(date)" || echo "No changes to commit"
          git push
